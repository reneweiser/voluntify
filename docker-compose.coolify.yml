services:
  app:
    image: ghcr.io/reneweiser/voluntify:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      PHP_MEMORY_LIMIT: "256M"
      PHP_POST_MAX_SIZE: "64M"
      PHP_UPLOAD_MAX_FILE_SIZE: "64M"
    ports:
      - "80"
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - app-data:/var/www/html/storage/app
    networks:
      - voluntify-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  scheduler:
    image: ghcr.io/reneweiser/voluntify:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    environment:
      PHP_MEMORY_LIMIT: "128M"
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - app-data:/var/www/html/storage/app
    networks:
      - voluntify-network

  queue:
    image: ghcr.io/reneweiser/voluntify:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    environment:
      PHP_MEMORY_LIMIT: "128M"
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - app-data:/var/www/html/storage/app
    networks:
      - voluntify-network

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: "${DB_DATABASE:-voluntify}"
      MARIADB_USER: "${DB_USERNAME:-voluntify_user}"
      MARIADB_PASSWORD: "${DB_PASSWORD}"
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - voluntify-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  voluntify-network:
    driver: bridge

volumes:
  app-data:
  mariadb-data:
