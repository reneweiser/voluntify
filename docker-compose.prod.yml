services:
  app:
    image: ghcr.io/reneweiser/voluntify:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:8080"
    environment:
      # Laravel automations (serversideup/php)
      AUTORUN_ENABLED: "true"
      AUTORUN_LARAVEL_MIGRATION: "true"
      AUTORUN_LARAVEL_CONFIG_CACHE: "true"
      AUTORUN_LARAVEL_ROUTE_CACHE: "true"
      AUTORUN_LARAVEL_VIEW_CACHE: "true"
      AUTORUN_LARAVEL_EVENT_CACHE: "true"
      AUTORUN_LARAVEL_STORAGE_LINK: "true"
      # PHP settings
      PHP_MEMORY_LIMIT: "256M"
      PHP_POST_MAX_SIZE: "64M"
      PHP_UPLOAD_MAX_FILE_SIZE: "64M"
    env_file:
      - .env.prod
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - app-data:/var/www/html/storage/app
    networks:
      - voluntify-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  scheduler:
    image: ghcr.io/reneweiser/voluntify:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    environment:
      AUTORUN_ENABLED: "false"
      PHP_MEMORY_LIMIT: "128M"
    env_file:
      - .env.prod
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - app-data:/var/www/html/storage/app
    networks:
      - voluntify-network

  queue:
    image: ghcr.io/reneweiser/voluntify:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    environment:
      AUTORUN_ENABLED: "false"
      PHP_MEMORY_LIMIT: "128M"
    env_file:
      - .env.prod
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - app-data:/var/www/html/storage/app
    networks:
      - voluntify-network

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: "${DB_DATABASE:-reneweiser_crm}"
      MARIADB_USER: "${DB_USERNAME:-crm}"
      MARIADB_PASSWORD: "${DB_PASSWORD}"
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - voluntify-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  voluntify-network:
    driver: bridge

volumes:
  app-data:
  mariadb-data:
