<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" width="700" height="200">
  <title>Event lifecycle: Draft to Published to Archived, with Clone back to Draft</title>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
  <!-- Draft -->
  <rect x="40" y="60" width="150" height="56" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="115" y="85" text-anchor="middle" fill="#1f2937" font-size="15" font-weight="600">Draft</text>
  <text x="115" y="103" text-anchor="middle" fill="#6b7280" font-size="11">Setting up</text>
  <!-- Arrow Draft → Published -->
  <line x1="190" y1="88" x2="250" y2="88" stroke="#059669" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="220" y="80" text-anchor="middle" fill="#059669" font-size="10" font-weight="500">Publish</text>
  <!-- Published -->
  <rect x="260" y="60" width="150" height="56" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="335" y="85" text-anchor="middle" fill="#059669" font-size="15" font-weight="600">Published</text>
  <text x="335" y="103" text-anchor="middle" fill="#6b7280" font-size="11">Accepting signups</text>
  <!-- Arrow Published → Archived -->
  <line x1="410" y1="88" x2="470" y2="88" stroke="#059669" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="440" y="80" text-anchor="middle" fill="#059669" font-size="10" font-weight="500">Archive</text>
  <!-- Archived -->
  <rect x="480" y="60" width="150" height="56" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="555" y="85" text-anchor="middle" fill="#1f2937" font-size="15" font-weight="600">Archived</text>
  <text x="555" y="103" text-anchor="middle" fill="#6b7280" font-size="11">Read-only</text>
  <!-- Clone arrow curving back -->
  <path d="M555,116 C555,170 115,170 115,116" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-gray)"/>
  <text x="335" y="168" text-anchor="middle" fill="#6b7280" font-size="11" font-style="italic">Clone → new Draft</text>
</svg>