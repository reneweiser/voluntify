<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 260" width="750" height="260">
  <title>Scanner workflow: camera detects QR, validates ticket, shows green for valid, yellow for duplicate, or red for invalid</title>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  </style>
  <defs>
    <marker id="a1" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="a-green" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="a-yellow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="a-red" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="a-gray" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
  <!-- Camera -->
  <rect x="30" y="80" width="120" height="56" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="90" y="105" text-anchor="middle" fill="#1f2937" font-size="13" font-weight="600">Camera</text>
  <text x="90" y="122" text-anchor="middle" fill="#6b7280" font-size="10">Viewfinder</text>
  <!-- Arrow Camera → Detect -->
  <line x1="150" y1="108" x2="178" y2="108" stroke="#059669" stroke-width="1.5" marker-end="url(#a1)"/>
  <!-- Detect QR -->
  <rect x="188" y="80" width="120" height="56" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="248" y="105" text-anchor="middle" fill="#1f2937" font-size="13" font-weight="600">Detect QR</text>
  <text x="248" y="122" text-anchor="middle" fill="#6b7280" font-size="10">Auto-scan</text>
  <!-- Arrow Detect → Validate -->
  <line x1="308" y1="108" x2="336" y2="108" stroke="#059669" stroke-width="1.5" marker-end="url(#a1)"/>
  <!-- Validate -->
  <rect x="346" y="80" width="120" height="56" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="406" y="105" text-anchor="middle" fill="#059669" font-size="13" font-weight="600">Validate</text>
  <text x="406" y="122" text-anchor="middle" fill="#6b7280" font-size="10">JWT check</text>
  <!-- Branch: Green (Valid) -->
  <line x1="466" y1="92" x2="534" y2="48" stroke="#059669" stroke-width="1.5" marker-end="url(#a-green)"/>
  <rect x="544" y="20" width="170" height="56" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="629" y="45" text-anchor="middle" fill="#059669" font-size="13" font-weight="600">Valid — New arrival</text>
  <text x="629" y="62" text-anchor="middle" fill="#6b7280" font-size="10">Tap Confirm Arrival</text>
  <!-- Return arrow from Valid back to Camera -->
  <path d="M629,20 C629,0 90,0 90,80" fill="none" stroke="#6b7280" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#a-gray)"/>
  <!-- Branch: Yellow (Duplicate) -->
  <line x1="466" y1="108" x2="534" y2="108" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#a-yellow)"/>
  <rect x="544" y="80" width="170" height="56" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="629" y="105" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="600">Already scanned</text>
  <text x="629" y="122" text-anchor="middle" fill="#6b7280" font-size="10">Shows first scan time</text>
  <!-- Branch: Red (Invalid) -->
  <line x1="466" y1="124" x2="534" y2="168" stroke="#ef4444" stroke-width="1.5" marker-end="url(#a-red)"/>
  <rect x="544" y="140" width="170" height="56" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="629" y="165" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="600">Invalid</text>
  <text x="629" y="182" text-anchor="middle" fill="#6b7280" font-size="10">Try manual lookup</text>
  <!-- Legend -->
  <text x="30" y="240" fill="#6b7280" font-size="10">
    <tspan fill="#059669" font-weight="600">Green</tspan> = confirmed  |
    <tspan fill="#f59e0b" font-weight="600">Yellow</tspan> = duplicate  |
    <tspan fill="#ef4444" font-weight="600">Red</tspan> = invalid
  </text>
</svg>