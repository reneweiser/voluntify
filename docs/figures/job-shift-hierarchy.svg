<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" width="720" height="280">
  <title>Job and shift hierarchy: an event contains jobs, each job contains shifts with time slots and capacity</title>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  </style>
  <!-- Tier labels -->
  <text x="16" y="44" fill="#6b7280" font-size="11" font-weight="500">EVENT</text>
  <text x="16" y="124" fill="#6b7280" font-size="11" font-weight="500">JOBS</text>
  <text x="16" y="230" fill="#6b7280" font-size="11" font-weight="500">SHIFTS</text>
  <!-- Dotted tier lines -->
  <line x1="70" y1="68" x2="700" y2="68" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="70" y1="168" x2="700" y2="168" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Event node -->
  <rect x="260" y="16" width="240" height="44" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="380" y="43" text-anchor="middle" fill="#059669" font-size="14" font-weight="600">Spring Community Cleanup</text>
  <!-- Job: Food Service -->
  <rect x="120" y="88" width="180" height="44" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="210" y="115" text-anchor="middle" fill="#1f2937" font-size="13" font-weight="600">Food Service</text>
  <!-- Job: Setup Crew -->
  <rect x="420" y="88" width="180" height="44" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="510" y="115" text-anchor="middle" fill="#1f2937" font-size="13" font-weight="600">Setup Crew</text>
  <!-- Connectors: Event → Jobs -->
  <line x1="340" y1="60" x2="210" y2="88" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="420" y1="60" x2="510" y2="88" stroke="#d1d5db" stroke-width="1.5"/>
  <!-- Shift: Food 9-12 -->
  <rect x="80" y="192" width="170" height="56" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="165" y="215" text-anchor="middle" fill="#1f2937" font-size="12" font-weight="500">9 AM – 12 PM</text>
  <text x="165" y="235" text-anchor="middle" fill="#6b7280" font-size="11">5 spots</text>
  <!-- Shift: Food 12-3 -->
  <rect x="270" y="192" width="170" height="56" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="355" y="215" text-anchor="middle" fill="#1f2937" font-size="12" font-weight="500">12 PM – 3 PM</text>
  <text x="355" y="235" text-anchor="middle" fill="#6b7280" font-size="11">5 spots</text>
  <!-- Shift: Setup 7-9 -->
  <rect x="480" y="192" width="170" height="56" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="565" y="215" text-anchor="middle" fill="#1f2937" font-size="12" font-weight="500">7 AM – 9 AM</text>
  <text x="565" y="235" text-anchor="middle" fill="#6b7280" font-size="11">8 spots</text>
  <!-- Connectors: Jobs → Shifts -->
  <line x1="180" y1="132" x2="165" y2="192" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="240" y1="132" x2="355" y2="192" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="510" y1="132" x2="565" y2="192" stroke="#d1d5db" stroke-width="1.5"/>
</svg>